# Spring application config
spring.application.name=rag4tickets
server.port=8082

# Spring AI Google GenAI settings
# Automatically uses GEMINI_API_KEY from environment if not specified here
spring.ai.google.genai.api-key=${GEMINI_API_KEY:DUMMY_KEY_FOR_LOCAL_SIMULATION}
spring.ai.google.genai.chat.model=gemini-1.5-flash
# Disable API key validation at startup — app handles missing/invalid keys at runtime
spring.ai.google.genai.chat.enabled=true

# Cache configuration
# Using 'simple' (in-memory) cache so the app works even if Redis sidecar is unavailable.
# Switch to 'redis' for production with a stable Redis connection.
spring.cache.type=simple

# Redis settings (kept for when switching back to redis cache type)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=2000
spring.cache.redis.time-to-live=600000

# Custom RAG properties
# SimpleVectorStore JSON storage path
rag.vector-store.path=vector-store.json

# Logging
logging.level.org.springframework.ai=INFO
logging.level.com.rag4tickets=DEBUG

# Show full error details in response body (for debugging Azure 500 errors)
server.error.include-message=always
server.error.include-exception=true
server.error.include-stacktrace=always
server.error.include-binding-errors=always
