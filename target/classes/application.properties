# Spring application config
spring.application.name=rag4tickets
server.port=8080

# Spring AI Google GenAI settings
# Automatically uses GEMINI_API_KEY from environment if not specified here
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.model=gemini-1.5-flash

# Redis cache configurations
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000

# Custom RAG properties
# SimpleVectorStore JSON storage path
rag.vector-store.path=vector-store.json

# Logging
logging.level.org.springframework.ai=INFO
logging.level.com.rag4tickets=DEBUG
